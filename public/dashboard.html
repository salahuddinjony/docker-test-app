<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>Users Dashboard</title>
    <style>
      .dashboard {
        max-width: 800px;
        margin: 2rem auto;
        text-align: left;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 0.5rem 1rem;
      }
      th {
        background: coral;
        color: white;
      }
      tr:nth-child(even) {
        background: #f9f9f9;
      }
      .nav {
        margin-bottom: 1rem;
      }
      .nav a {
        color: coral;
        margin-right: 1rem;
      }
      .empty {
        color: #666;
        font-style: italic;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="nav">
        <a href="/">← Sign up</a>
      </div>
      <h1>Users Dashboard</h1>
      <p>All users from database (getUsers API):</p>
      <div id="usersList">
        <p class="empty">Loading...</p>
      </div>
    </div>

    <script>
      async function loadUsers() {
        const el = document.getElementById("usersList");
        try {
          const res = await fetch("/getUsers");
          const users = await res.json();
          if (!Array.isArray(users) || users.length === 0) {
            el.innerHTML =
              '<p class="empty">No users yet. Sign up to add users.</p>';
            return;
          }
          el.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Email</th><th>Username</th><th>Password</th></tr>
                        </thead>
                        <tbody>
                            ${users
                              .map(
                                (u) => `
                                <tr>
                                    <td>${escapeHtml(u.email || "-")}</td>
                                    <td>${escapeHtml(u.username || "-")}</td>
                                    <td>${escapeHtml(u.password || u.pass || "-")}</td>
                                </tr>
                            `,
                              )
                              .join("")}
                        </tbody>
                    </table>
                `;
        } catch (err) {
          el.innerHTML =
            '<p class="empty">Error loading users: ' +
            escapeHtml(err.message) +
            "</p>";
        }
      }
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
      loadUsers();
    </script>
  </body>
</html>
